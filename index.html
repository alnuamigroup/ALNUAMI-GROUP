<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام البحث عن اللوحات</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --dark: #0A0A0A;
    --dark2: #111111;
    --dark3: #1A1A1A;
    --dark4: #222222;
    --text: #F0F0F0;
    --text-muted: #888;
    --border: #2A2A2A;
    --success: #2ECC71;
    --danger: #E74C3C;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--dark2), var(--dark3));
    border-bottom: 1px solid var(--gold);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 900;
    color: var(--gold);
  }

  .header p {
    font-size: 12px;
    color: var(--text-muted);
  }

  .stats-bar {
    margin-right: auto;
    background: var(--dark4);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 16px;
    text-align: center;
  }

  .stats-bar .count {
    font-size: 22px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }

  .stats-bar .label {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Main Layout */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Search Bar */
  .search-section {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .search-wrapper {
    display: flex;
    gap: 10px;
  }

  .search-input {
    flex: 1;
    background: var(--dark4);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'Cairo', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    direction: ltr;
    text-align: center;
    letter-spacing: 2px;
  }

  .search-input:focus {
    border-color: var(--gold);
  }

  .search-input::placeholder {
    color: var(--text-muted);
    letter-spacing: 0;
    font-size: 14px;
  }

  .search-btn {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border: none;
    border-radius: 12px;
    padding: 14px 24px;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--dark);
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .search-btn:hover { opacity: 0.9; transform: scale(1.02); }
  .search-btn:active { transform: scale(0.98); }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .filter-btn {
    background: var(--dark4);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201, 168, 76, 0.1);
  }

  /* Upload Section */
  .upload-section {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .section-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .upload-area {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 30px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .upload-area:hover, .upload-area.drag-over {
    border-color: var(--gold);
    background: rgba(201, 168, 76, 0.05);
  }

  .upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon { font-size: 36px; margin-bottom: 10px; }

  .upload-area p {
    font-size: 14px;
    color: var(--text-muted);
  }

  .upload-area strong {
    color: var(--gold);
    display: block;
    font-size: 16px;
    margin-bottom: 4px;
  }

  /* API Key */
  .api-section {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .api-input-wrapper {
    display: flex;
    gap: 10px;
  }

  .api-input {
    flex: 1;
    background: var(--dark4);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    direction: ltr;
    transition: border-color 0.2s;
  }

  .api-input:focus { border-color: var(--gold); }

  .save-btn {
    background: var(--dark4);
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 12px 20px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .save-btn:hover { background: rgba(201, 168, 76, 0.1); }

  /* Processing Status */
  .processing-bar {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    display: none;
  }

  .processing-bar.visible { display: block; }

  .progress-track {
    background: var(--dark4);
    border-radius: 100px;
    height: 8px;
    overflow: hidden;
    margin: 12px 0;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 100px;
    transition: width 0.3s;
    width: 0%;
  }

  .progress-text {
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
  }

  /* Results */
  .results-section {
    display: none;
  }

  .results-section.visible { display: block; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .results-count {
    font-size: 13px;
    color: var(--text-muted);
  }

  .results-count span {
    color: var(--gold);
    font-weight: 700;
  }

  .export-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .export-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .plates-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .plate-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    transition: all 0.2s;
    cursor: pointer;
  }

  .plate-card:hover {
    border-color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(201, 168, 76, 0.1);
  }

  .plate-number {
    font-size: 28px;
    font-weight: 900;
    color: var(--text);
    direction: ltr;
    text-align: center;
    background: var(--dark4);
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 12px;
    letter-spacing: 3px;
    border: 2px solid var(--border);
  }

  .plate-meta {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .plate-meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
  }

  .meta-label { color: var(--text-muted); }

  .meta-value {
    font-weight: 700;
    color: var(--text);
  }

  .meta-value.price { color: var(--gold); }
  .meta-value.phone { color: #5DADE2; direction: ltr; }

  .call-btn {
    width: 100%;
    margin-top: 12px;
    background: rgba(93, 173, 226, 0.1);
    border: 1px solid rgba(93, 173, 226, 0.3);
    border-radius: 8px;
    padding: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #5DADE2;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .call-btn:hover { background: rgba(93, 173, 226, 0.2); }

  .delete-btn {
    width: 100%;
    margin-top: 6px;
    background: rgba(231, 76, 60, 0.08);
    border: 1px solid rgba(231, 76, 60, 0.3);
    border-radius: 8px;
    padding: 8px;
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: #E74C3C;
    cursor: pointer;
    transition: all 0.2s;
  }

  .delete-btn:hover { background: rgba(231, 76, 60, 0.2); }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
  }

  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--dark3);
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    z-index: 999;
    transition: transform 0.3s;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* No results */
  .no-results {
    text-align: center;
    padding: 30px;
    color: var(--text-muted);
    font-size: 14px;
    display: none;
  }

  .no-results.visible { display: block; }

  @media (max-width: 600px) {
    .plates-grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 16px; }
    .stats-bar { display: none; }
  }
</style>
</head>

  const FB_URL = "https://plates-4d6cf-default-rtdb.firebaseio.com";

  let plates = [];

  // Load from Firebase on start
  async function loadFromFirebase() {
    try {
      const res = await fetch(FB_URL + "/plates.json");
      const data = await res.json();
      if (data) {
        plates = Array.isArray(data) ? data : Object.values(data);
        plates = plates.map((p, i) => ({ ...p, _id: p._id || i }));
      } else {
        plates = [];
      }
      updateCount();
      renderPlates(plates.map((p,i)=>({p,i})));
    } catch(e) {
      console.error("Firebase load error:", e);
      plates = JSON.parse(localStorage.getItem('plates') || '[]');
      updateCount();
      renderPlates(plates.map((p,i)=>({p,i})));
    }
  }

  // Save to Firebase
  async function saveToFirebase() {
    try {
      await fetch(FB_URL + "/plates.json", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(plates)
      });
      localStorage.setItem('plates', JSON.stringify(plates));
    } catch(e) {
      console.error("Firebase save error:", e);
      localStorage.setItem('plates', JSON.stringify(plates));
    }
  }
  let activeFilter = 'all';

  async function testApiKey() {
    const key = document.getElementById("apiKeyInput").value.trim();
    if (!key) return showToast("أدخل الـ API Key أولاً");
    showToast("⏳ جاري الاختبار...");
    try {
      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + key
        },
        body: JSON.stringify({
          model: "openrouter/auto",
          max_tokens: 10,
          messages: [{ role: "user", content: "hi" }]
        })
      });
      const data = await res.json();
      if (data.error) { showToast("❌ " + data.error.message); }
      else { showToast("✅ الـ API Key يشتغل!"); }
    } catch(e) { showToast("❌ تعذر الاتصال"); }
  }

  function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) return showToast('أدخل الـ API Key');
    apiKey = key;
    localStorage.setItem('geminiKey', key);
    showToast('✅ تم حفظ الـ API Key');
  }

  async function handleFiles(files) {
    if (!apiKey) return showToast('⚠️ احفظ الـ API Key أولاً');
    if (!files.length) return;

    const bar = document.getElementById('processingBar');
    bar.classList.add('visible');

    let done = 0;
    const total = files.length;

    for (const file of files) {
      try {
        const base64 = await toBase64(file);
        const result = await extractPlates(base64, file.type);
        if (result && result.length) {
          plates.push(...result);
        }
      } catch (e) {
        console.error(e);
      }
      done++;
      const pct = Math.round((done / total) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressLabel').textContent = `${done} / ${total} صورة`;
      document.getElementById('progressPercent').textContent = pct + '%';
    }

    // Save & render
    await saveToFirebase();
    bar.classList.remove('visible');
    updateCount();
    doSearch();
    showToast(`✅ تم استخراج ${plates.length} لوحة`);
  }

  function toBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  }

            role: "user",
            content: [
              { type: "image_url", image_url: { url: "data:" + mimeType + ";base64," + base64 } },
              { type: "text", text: prompt }
            ]
          }]
        })
      });
    } catch(netErr) {
      showToast('❌ خطأ في الشبكة — تحقق من الاتصال');
      console.error('Network error:', netErr);
      return [];
    }

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      const msg = errData?.error?.message || res.status;
      showToast(`❌ خطأ من Gemini: ${msg}`);
      console.error('Gemini error:', errData);
      return [];
    }

    const data = await res.json();
    const text = data?.choices?.[0]?.message?.content || '';
    const clean = text.replace(/```json|```/g, '').trim();
    try {
      const parsed = JSON.parse(clean);
      return Array.isArray(parsed) ? parsed : [];
    } catch {
      console.error('Parse error, raw text:', text);
      return [];
    }
  }

  function doSearch() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    
    let filtered = plates.map((p, i) => ({ p, i }));

    if (activeFilter !== 'all') {
      filtered = filtered.filter(({p}) =>
        (p.emirate || '').includes(activeFilter)
      );
    }

    if (q) {
      filtered = filtered.filter(({p}) =>
        (p.plate || '').toLowerCase().includes(q) ||
        (p.phone || '').includes(q) ||
        (p.emirate || '').toLowerCase().includes(q)
      );
    }

    renderPlates(filtered);
  }

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    doSearch();
  }

  function renderPlates(list, isFiltered = false) {
    const grid = document.getElementById('platesGrid');
    const noRes = document.getElementById('noResults');
    document.getElementById('shownCount').textContent = list.length;

    if (!list.length && plates.length === 0) {
      grid.innerHTML = `<div class="empty-state"><div class="emoji">🏁</div><p>ارفع صور اللوحات وسيتم استخراج البيانات تلقائياً</p></div>`;
      noRes.classList.remove('visible');
      return;
    }

    if (!list.length) {
      grid.innerHTML = '';
      noRes.classList.add('visible');
      return;
    }

    noRes.classList.remove('visible');
    grid.innerHTML = list.map(({p, i: idx}) => {
      return `
      <div class="plate-card">
        <div class="plate-number">${p.plate || '—'}</div>
        <div class="plate-meta">
          <div class="plate-meta-row">
            <span class="meta-label">الإمارة</span>
            <span class="meta-value">${p.emirate || '—'} ${p.code ? '· ' + p.code : ''}</span>
          </div>
          <div class="plate-meta-row">
            <span class="meta-label">السعر</span>
            <span class="meta-value price">${p.price ? 'AED ' + Number(p.price).toLocaleString() : '—'}</span>
          </div>
          <div class="plate-meta-row">
            <span class="meta-label">التواصل</span>
            <span class="meta-value phone">${p.phone || '—'}</span>
          </div>
        </div>
        ${p.phone ? `<button class="call-btn" onclick="copyPhone('${p.phone}')">📋 نسخ الرقم</button>` : ''}
        <div style="display:flex;gap:6px;margin-top:6px;">
          <button class="delete-btn" style="flex:1" onclick="editPlate(${idx})">✏️ تعديل</button>
          <button class="delete-btn" style="flex:1;background:rgba(231,76,60,0.08);border-color:rgba(231,76,60,0.3);color:#E74C3C" onclick="deletePlate(${idx})">🗑️ حذف</button>
        </div>
      </div>
    `;}).join('');
  }

  function copyPhone(phone) {
    navigator.clipboard.writeText(phone).then(() => showToast('✅ تم نسخ الرقم'));
  }

  function editPlate(idx) {
    if (!checkAdmin()) return;
    if (idx < 0 || idx >= plates.length) return showToast('❌ ما لقيت اللوحة');
    openEditModal(idx);
  }

  function openEditModal(idx) {
    const p = plates[idx];
    // Remove existing modal
    const old = document.getElementById('editModal');
    if (old) old.remove();

    const modal = document.createElement('div');
    modal.id = 'editModal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;';
    modal.innerHTML = `
      <div style="background:#1A1A1A;border:1px solid #C9A84C;border-radius:16px;padding:24px;width:100%;max-width:400px;direction:rtl;">
        <h3 style="color:#C9A84C;margin:0 0 16px;font-family:Cairo,sans-serif;">✏️ تعديل اللوحة</h3>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <input id="e_plate" style="background:#222;border:1px solid #333;border-radius:8px;padding:10px;color:#fff;font-family:Cairo,sans-serif;font-size:16px;" value="${p.plate||''}" placeholder="رقم اللوحة" />
          <input id="e_emirate" style="background:#222;border:1px solid #333;border-radius:8px;padding:10px;color:#fff;font-family:Cairo,sans-serif;" value="${p.emirate||''}" placeholder="الإمارة" />
          <input id="e_code" style="background:#222;border:1px solid #333;border-radius:8px;padding:10px;color:#fff;font-family:Cairo,sans-serif;" value="${p.code||''}" placeholder="الكود" />
          <input id="e_price" style="background:#222;border:1px solid #333;border-radius:8px;padding:10px;color:#fff;font-family:Cairo,sans-serif;" value="${p.price||''}" placeholder="السعر" />
          <input id="e_phone" style="background:#222;border:1px solid #333;border-radius:8px;padding:10px;color:#fff;font-family:Cairo,sans-serif;direction:ltr;" value="${p.phone||''}" placeholder="رقم التواصل" />
        </div>
        <div style="display:flex;gap:10px;margin-top:16px;">
          <button onclick="saveEdit(${idx})" style="flex:1;background:linear-gradient(135deg,#C9A84C,#E8C96A);border:none;border-radius:8px;padding:12px;font-family:Cairo,sans-serif;font-weight:700;color:#000;cursor:pointer;">حفظ</button>
          <button onclick="document.getElementById('editModal').remove()" style="flex:1;background:#222;border:1px solid #333;border-radius:8px;padding:12px;font-family:Cairo,sans-serif;color:#888;cursor:pointer;">إلغاء</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
  }

  async function saveEdit(idx) {
    plates[idx] = {
      ...plates[idx],
      plate: document.getElementById('e_plate').value,
      emirate: document.getElementById('e_emirate').value,
      code: document.getElementById('e_code').value,
      price: document.getElementById('e_price').value,
      phone: document.getElementById('e_phone').value,
    };
    document.getElementById('editModal').remove();
    await saveToFirebase();
    updateCount();
    doSearch();
    showToast('✅ تم التعديل');
  }

  async function deletePlate(id) {
    if (!checkAdmin()) return;
    if (!confirm('تبي تحذف هذه اللوحة؟')) return;
    plates = plates.filter(x => x._id !== id);
    await saveToFirebase();
    updateCount();
    doSearch();
    showToast('🗑️ تم الحذف');
  }

  function updateCount() {
    document.getElementById('totalCount').textContent = plates.length;
    document.getElementById('shownCount').textContent = plates.length;
  }

  function exportCSV() {
    if (!plates.length) return showToast('ما في بيانات للتصدير');
    const header = 'رقم اللوحة,الإمارة,الكود,السعر,التواصل\n';
    const rows = plates.map(p => `${p.plate},${p.emirate},${p.code},${p.price},${p.phone}`).join('\n');
    const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'plates.csv';
    a.click();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Drag & Drop
  const area = document.getElementById('uploadArea');
  area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('drag-over'); });
  area.addEventListener('dragleave', () => area.classList.remove('drag-over'));
  area.addEventListener('drop', e => {
    e.preventDefault();
    area.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });
</script>
</body>
</html>
